<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading Archive</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f8f2;
    --surface: #f0f1eb;
    --border: #dddedd;
    --text: #1a1a1a;
    --muted: #888;
    --tag-bg: #e0f5ec;
    --tag-color: #2dc891;
    --accent: #2dc891;
    --accent2: #1a9e6e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Libre Baskerville', Georgia, serif;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .wrapper {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 24px;
    position: relative;
    z-index: 1;
  }

  header {
    padding: 60px 0 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
  }

  .header-top {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Libre Baskerville', serif;
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 700;
    letter-spacing: -1px;
    color: var(--text);
  }

  .count-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 300;
    color: var(--accent);
    background: var(--tag-bg);
    padding: 3px 10px;
    border-radius: 2px;
    letter-spacing: 1px;
  }

  .subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    font-weight: 300;
    letter-spacing: 0.5px;
  }

  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    align-items: center;
    flex-wrap: wrap;
  }

  .search-wrap {
    flex: 1;
    min-width: 240px;
    position: relative;
  }

  .search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 18px;
    pointer-events: none;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 12px 14px 12px 38px;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  .btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1px;
    padding: 12px 20px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--accent2); color: var(--accent2); }

  .filter-row {
    display: flex;
    gap: 6px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .filter-tab {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 5px 12px;
    border-radius: 2px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .filter-tab:hover, .filter-tab.active {
    background: var(--tag-bg);
    color: var(--accent);
    border-color: var(--accent);
  }

  .results-info {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 16px;
    letter-spacing: 0.5px;
  }

  .papers-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .paper-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px 24px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
    position: relative;
    animation: fadeIn 0.3s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .paper-card:hover { border-color: #3a3a3a; transform: translateX(3px); }
  .paper-card.expanded { border-color: var(--accent); }

  .paper-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
  }

  .paper-title {
    font-size: 16px;
    font-weight: 700;
    line-height: 1.4;
    color: var(--text);
    flex: 1;
  }

  .paper-year {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    font-weight: 400;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .paper-authors {
    font-size: 13px;
    color: var(--muted);
    margin-top: 6px;
    font-style: italic;
  }

  .paper-tags {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.8px;
    padding: 3px 8px;
    border-radius: 2px;
    background: var(--tag-bg);
    color: var(--accent);
    text-transform: uppercase;
  }

  .tag.blue { background: #0f2030; color: var(--accent2); }
  .tag.orange { background: #2a1a0a; color: #f0a060; }

  .paper-body {
    display: none;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .paper-card.expanded .paper-body { display: block; }

  .paper-notes {
    font-size: 14px;
    line-height: 1.7;
    color: #666;
  }

  .paper-link {
    display: inline-block;
    margin-top: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    text-decoration: none;
    letter-spacing: 0.5px;
  }
  .paper-link:hover { text-decoration: underline; }

  .empty {
    text-align: center;
    padding: 80px 0;
    color: var(--muted);
  }
  .empty .icon { font-size: 40px; margin-bottom: 16px; opacity: 0.4; }
  .empty p { font-family: 'JetBrains Mono', monospace; font-size: 13px; }

  .status-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }
  .status-dot.read    { background: var(--accent); }
  .status-dot.reading { background: var(--accent2); }
  .status-dot.unread  { background: var(--muted); }
  .status-dot.queue   { background: #f0a060; }

  footer {
    text-align: center;
    padding: 48px 0 32px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--border);
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="header-top">
      <h1>Reading Archive</h1>
      <span class="count-badge" id="totalCount">0 papers</span>
    </div>
    <p class="subtitle">mechanistic interpretability · cognitive neuroscience · ML theory</p>
  </header>

  <div class="controls">
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="search by title, author, keyword…" oninput="renderPapers()">
    </div>
    <button class="btn btn-ghost" onclick="clearSearch()">CLEAR</button>
  </div>

  <div class="filter-row" id="filterRow">
    <button class="filter-tab active" onclick="setFilter('all', this)">ALL</button>
    <button class="filter-tab" onclick="setFilter('read', this)">READ</button>
    <button class="filter-tab" onclick="setFilter('reading', this)">IN PROGRESS</button>
    <button class="filter-tab" onclick="setFilter('queue', this)">QUEUE</button>
    <button class="filter-tab" onclick="setFilter('unread', this)">UNREAD</button>
  </div>

  <div class="results-info" id="resultsInfo"></div>
  <div class="papers-list" id="papersList"></div>
  <div class="empty" id="emptyState" style="display:none">
    <div class="icon">◎</div>
    <p>No papers found.</p>
  </div>
</div>

<footer>personal archive · built for the curious</footer>

<script>
let papers = [];
let activeFilter = 'all';

const DEFAULT_PAPERS = [
  {
    id: 1,
    title: "Linking neural manifolds to circuit structure in recurrent networks",
    authors: "Louis Pezon, Valentin Schmutz, Wulfram Gerstner",
    year: "2026",
    link: "https://www.sciencedirect.com/science/article/pii/S0896627325010037",
    tags: ["neuroscience", "recurrent neural networks", "large networks", "neural manifold"],
    status: "queue",
    notes: ""
  },
  {
    id: 2,
    title: "The emergence of informative higher scales in complex networks",
    authors: "Brennan Klein, Erik Hoel",
    year: "2019",
    link: "https://arxiv.org/abs/1907.03902",
    tags: ["effective information", "causal emergence"],
    status: "reading",
    notes: "Used in my Personal project (2026)"
  },
  {
    id: 3,
    title: "Flat teams drive scientific innovation",
    authors: "James Evans, Fengli Xu, Lingfei Wu",
    year: "2022",
    link: "https://www.pnas.org/doi/10.1073/pnas.2200927119",
    tags: ["social network", "network metrics", "teams", "hierarchy", "science of science"],
    status: "reading",
    notes: "Used in my Personal project (2026)"
  },
  {
    id: 4,
    title: "Atypical combinations and scientific impact",
    authors: "Brian Uzzi, Satyam Mukherjee, Michael Stringer, Ben Jones",
    year: "2013",
    link: "https://www.science.org/doi/10.1126/science.1240474",
    tags: ["atypicality", "novelty", "science of science"],
    status: "queue",
    notes: ""
  },
  {
    id: 5,
    title: "Do LLMs Benefit From Their Own Words?",
    authors: "Jenny Y. Huang, et al.",
    year: "2026",
    link: "https://arxiv.org/abs/2602.24287",
    tags: ["language models", "context pollution"],
    status: "queue",
    notes: ""
  },
  {
    id: 6,
    title: "Artificial Hivemind: The Open-Ended Homogeneity of Language Models (and Beyond)",
    authors: "Liwei Jiang, et al.",
    year: "2025",
    link: "https://arxiv.org/abs/2510.22954",
    tags: ["language models", "LLMs", "output diversity"],
    status: "queue",
    notes: ""
  },
  {
    id: 7,
    title: "Liver exerkine reverses aging- and Alzheimer's-related memory loss via vasculature",
    authors: "Gregor Bieri, et al.",
    year: "2026",
    link: "https://www.cell.com/cell/fulltext/S0092-8674(26)00111-X",
    tags: ["Alzheimer's disease", "aging", "blood-brain barrier", "cognition", "exercise", "rejuvenation"],
    status: "queue",
    notes: ""
  },
  {
    id: 8,
    title: "Nestedness and modularity in bipartite networks",
    authors: "Stephen J. Beckett",
    year: "2015",
    link: "https://www.researchgate.net/publication/281101612_Nestedness_and_modularity_in_bipartite_networks",
    tags: ["bipartite networks", "nestedness", "modularity"],
    status: "reading",
    notes: ""
  },
  {
    id: 9,
    title: "Nestedness versus modularity in ecological networks: two sides of the same coin?",
    authors: "Miguel A. Fortuna, et al.",
    year: "2010",
    link: "https://besjournals.onlinelibrary.wiley.com/doi/10.1111/j.1365-2656.2010.01688.x",
    tags: ["ecological networks", "nestedness", "modularity"],
    status: "queue",
    notes: ""
  },
  {
    id: 10,
    title: "A Mathematical Framework for Transformer Circuits",
    authors: "Nelson Elhage, Neel Nanda, Catherine Olsson, et al."
    year: "2021",
    link: "https://transformer-circuits.pub/2021/framework/index.html",
    tags: ["transformers", "language models"],
    status: "queue",
    notes: "Anthropic"
  }
  
];

function load() {
  papers = DEFAULT_PAPERS;
  renderPapers();
}

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderPapers();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  renderPapers();
}

function renderPapers() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  let filtered = papers.filter(p => {
    const matchSearch = !q ||
      p.title.toLowerCase().includes(q) ||
      p.authors.toLowerCase().includes(q) ||
      (p.tags || []).some(t => t.toLowerCase().includes(q)) ||
      (p.notes || '').toLowerCase().includes(q);
    const matchFilter = activeFilter === 'all' || p.status === activeFilter;
    return matchSearch && matchFilter;
  });

  const order = { reading: 0, read: 1, queue: 2, unread: 3 };
  filtered.sort((a, b) => order[a.status] - order[b.status] || (b.year || 0) - (a.year || 0));

  document.getElementById('totalCount').textContent = `${papers.length} paper${papers.length !== 1 ? 's' : ''}`;
  document.getElementById('resultsInfo').textContent =
    q || activeFilter !== 'all' ? `${filtered.length} result${filtered.length !== 1 ? 's' : ''}` : '';

  const list = document.getElementById('papersList');
  const empty = document.getElementById('emptyState');

  if (filtered.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  list.innerHTML = filtered.map((p, i) => {
    const tagColors = { SAE: 'blue', circuits: '', transformers: '', features: '', foundational: 'orange', scaling: 'orange' };
    const tagsHtml = (p.tags || []).map(t => {
      const cls = tagColors[t] || '';
      return `<span class="tag ${cls}">${t}</span>`;
    }).join('');
    const linkHtml = p.link ? `<a class="paper-link" href="${p.link}" target="_blank">↗ open paper</a>` : '';
    const notesHtml = p.notes ? `<p class="paper-notes">${p.notes}</p>` : `<p class="paper-notes" style="color:#aaa;font-style:italic">No notes yet.</p>`;

    return `
      <div class="paper-card" id="card-${p.id}" onclick="toggleCard(${p.id})" style="animation-delay:${i * 0.04}s">
        <div class="paper-header">
          <div class="paper-title">
            <span class="status-dot ${p.status}"></span>${p.title}
          </div>
          <span class="paper-year">${p.year || '—'}</span>
        </div>
        <div class="paper-authors">${p.authors}</div>
        <div class="paper-tags">${tagsHtml}</div>
        <div class="paper-body">
          ${notesHtml}
          ${linkHtml}
        </div>
      </div>`;
  }).join('');
}

function toggleCard(id) {
  const card = document.getElementById('card-' + id);
  card.classList.toggle('expanded');
}

document.addEventListener('keydown', e => {
  if (e.key === 'f' && (e.metaKey || e.ctrlKey)) {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});

load();
</script>
</body>
</html>
